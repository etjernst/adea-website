<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>document.documentElement.className += ' js';</script>
  <title>{% block title %}{{ page.title }} — {{ site.name }}{% endblock %}</title>
  <meta name="description" content="{{ page.description | default(site.description) }}">
  <link rel="icon" type="image/png" href="{{ rel }}assets/images/adea-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Hanken+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ rel }}assets/css/site.css">
</head>
<body>
  {% include "partials/header.html" %}
  <main>
    {% block content %}{% endblock %}
  </main>
  {% include "partials/footer.html" %}
  <script src="{{ rel }}assets/js/site.js" defer></script>
</body>
</html>
