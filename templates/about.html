{% extends "base.html" %}
{% block content %}

<section class="section">
  <div class="wrap">
    <div class="hero">
      <div class="hero__text reveal">
        <p class="eyebrow">About</p>
        <h1>{{ page.heading }}</h1>
        <p class="lede">{{ page.intro }}</p>
      </div>
      <div class="hero__media reveal">
        <img src="{{ rel }}assets/images/{{ page.hero_image }}" alt="{{ page.hero_alt }}" loading="eager">
      </div>
    </div>
  </div>
</section>

<section class="section section--alt">
  <div class="wrap">
    <p class="eyebrow">Our mission</p>
    <h2>{{ page.mission_heading }}</h2>
    <ol class="mission">
      {% for item in page.mission %}
      <li class="reveal">
        <span class="n">{{ "%02d"|format(loop.index) }}</span>
        <p>{{ item }}</p>
      </li>
      {% endfor %}
    </ol>
  </div>
</section>

{% endblock %}
